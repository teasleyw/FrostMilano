<style>
  body{
    margin:0; background:#05131f; color:#eafcff;
    /* Colour-emoji fonts sit ahead of the generic family for the same reason
       they do in css/style.css: on Windows, Segoe UI Symbol (monochrome) wins
       the fallback race before Segoe UI Emoji unless it is named outright,
       and the snowflakes here would render as flat grey glyphs. */
    font-family:ui-monospace,Consolas,
      "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",monospace;
    display:flex; flex-direction:column; align-items:center; gap:14px;

  }
  h1{ font-size:1rem; letter-spacing:2px; color:#b8ecff; margin:0; }
  /* Styled to echo .navbar__btn on the main site so the trip back feels like
     the same place, without pulling in the whole stylesheet. */
  .back{
    font-size:.78rem; letter-spacing:1px; text-decoration:none;
    color:#eafcff; padding:6px 14px; border-radius:6px;
    background:linear-gradient(180deg,#155a82,#0a3350);
    border:2px outset #4bb4d8;
    text-shadow:0 1px 0 #02101c;
    transition:filter .12s ease, transform .08s ease;
  }
  .back:hover{ filter:brightness(1.25); color:#fff; transform:translateY(-1px); }

  p{ font-size:.8rem; color:#6bb8dd; margin:0; text-align:center; }
  canvas{
    /* Native pixel buffer, upscaled by CSS - never resample pixel art. */
    image-rendering:pixelated;

    background:#05131f; cursor:pointer;

<h1>&#10052; FROST LOUNGE &#10052;</h1>
<p>click a tile to walk there &mdash; prototype</p>
<canvas id="stage" width="340" height="300"></canvas>
<div id="hud"></div>

<script>
(function () {
  "use strict";

  /* ================= palette ================= */
  var HEX = {
    O: "#05131f", deep2: "#0a2740", mid: "#0e4a6e", bright: "#38e6ff",
    light: "#b8ecff", f3: "#6bb8dd", f4: "#2b6f96", gold: "#ffd68a",
    skin: "#d9a06b", mouth: "#8a5a3a",
    /* The checkerboard. The dark square is charcoal rather than true black on
       purpose: avatars are outlined in #05131f, and on a pure black tile that
       outline disappears and the figure loses its silhouette. Charcoal still
       reads as black beside a near-white square but keeps the outline alive. */
    chkLight: "#e9f4fa", chkDark: "#151f2a",
    bubble: "#f2fbff", bubbleInk: "#0a1a26"
  };

  function rgb(hex) {
    return [parseInt(hex.slice(1, 3), 16),
            parseInt(hex.slice(3, 5), 16),
            parseInt(hex.slice(5, 7), 16), 255];
  }
  function shade(c, f) {
    function ch(v) {
      return f <= 1 ? Math.max(0, Math.min(255, (v * f) | 0))
                    : Math.max(0, Math.min(255, (v + (255 - v) * (f - 1)) | 0));
    }
    return [ch(c[0]), ch(c[1]), ch(c[2]), c[3]];
  }
  function css(c) { return "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")"; }

  var CLEAR = [0, 0, 0, 0];

  /* ================= authored sprite grids =================
     Same grids as the generator: direction comes from asymmetry (hair banks
     up on the trailing side), so mirroring reads as a real turn. */
  var HEAD_F = [
    "......OOOOOOOO......",
    "....OOHHHHHHHHOO....",
    "...OHHHHHHHHHHHHO...",
    "..OHHHHHHHHHHHHHHO..",
    "..OHHHHHHHHHHHHHHO..",
    "..OHHHFFFFFFFFFFHO..",
    "..OHHHFFFFFFFFFFFO..",
    "..OHHFFFEEFFFFEEFO..",
    "..OHHFFFEEFFFFEEFO..",
    "..OHHFFFFFFFFFFFFO..",
    "..OHHFFFFFMMMMFFFO..",
    "..OHHFFFFFFFFFFFFO..",
    "...OHFFFFFFFFFFFO...",
    "....OOOOOOOOOOOO...."
  ];
  /* Back of the head deliberately has NO strand texture: at 20px the strands
     read as eyes and a snout, which looked like a face on the wrong side. */
  var HEAD_B = [
    "......OOOOOOOO......",
    "....OOHHHHHHHHOO....",
    "...OHGGGGGGGGGGHO...",
    "..OHHGGGGGGGGGGHHO..",
    "..OHHHGGGGGGGGHHHO..",
    "..OHHHHHHHHHHHHHHO..",
    "..OHHHHHHHHHHHHHHO..",
    "..OHHHHHHHHHHHHHHO..",
    "..OHHHHHHHHHHHHHHO..",
    "..OHHHHHHHHHHHHHHO..",
    "..OHHHNNNNNNNNHHHO..",
    "..OHHNNNNNNNNNNHHO..",
    "...OHHNNNNNNNNHHO...",
    "....OOOOOOOOOOOO...."
  ];
  var TORSO_F = [
    "........OSSO........",
    "....OOOJJJJJJOOO....",
    "...OAAOJJJJJJOAAO...",
    "..OAAAOJJJJJJOAAAO..",
    "..OAAAOJJJJJJOAAAO..",
    "..OAAAOJJJJJJOAAAO..",
    "..OAAAOJJJJJJOAAAO..",
    "..OAAAOJJJJJJOAAAO..",
    "..OSSSOJJJJJJOSSSO..",
    "...OOOOJJJJJJOOOO...",
    ".....OJJJJJJJJO.....",
    ".....OJJJJJJJJO.....",
    ".....OJJJJJJJJO....."
  ];
  var TORSO_B = TORSO_F.slice();
  TORSO_B[0] = "........OKKO........";   /* collar, not neck skin */

  var LEGS_STAND = [
    ".....OPPPPPPPPO.....",
    ".....OPPPPPPPPO.....",
    ".....OPPPPPPPPO.....",
    ".....OPPPOOPPPO.....",
    ".....OPPO..OPPO.....",
    ".....OPPO..OPPO.....",
    ".....OPPO..OPPO.....",
    ".....OPPO..OPPO.....",
    ".....OBBO..OBBO.....",
    ".....OBBO..OBBO.....",
    ".....OOOO..OOOO....."
  ];
  var LEGS_A = [
    ".....OPPPPPPPPO.....",
    ".....OPPPPPPPPO.....",
    ".....OPPPOOPPPO.....",
    "....OpppO..OPPPO....",
    "....OpppO..OPPPO....",
    "...OpppO....OPPPO...",
    "...OpppO....OPPPO...",
    "...OppO......OPPO...",
    "...ObbO......OBBO...",
    "..ObbbO......OBBBO..",
    "..OOOOO......OOOOO.."
  ];
  var LEGS_B = [
    ".....OPPPPPPPPO.....",
    ".....OPPPPPPPPO.....",
    ".....OPPPOOPPPO.....",
    "....OPPPO..OpppO....",
    "....OPPPO..OpppO....",
    "...OPPPO....OpppO...",
    "...OPPPO....OpppO...",
    "...OPPO......OppO...",
    "...OBBO......ObbO...",
    "..OBBBO......ObbbO..",
    "..OOOOO......OOOOO.."
  ];
  var LEGS_PASS_A = [
    ".....OPPPPPPPPO.....",
    ".....OPPPPPPPPO.....",
    ".....OPPPPPPPPO.....",
    ".....OPPPOOPPPO.....",
    ".....OppO..OPPO.....",
    ".....OppO..OPPO.....",
    ".....OppO..OPPO.....",
    ".....OppO..OPPO.....",
    ".....ObbO..OBBO.....",
    ".....ObbO..OBBO.....",
    ".....OOOO..OOOO....."
  ];
  var LEGS_PASS_B = [
    ".....OPPPPPPPPO.....",
    ".....OPPPPPPPPO.....",
    ".....OPPPPPPPPO.....",
    ".....OPPPOOPPPO.....",
    ".....OPPO..OppO.....",
    ".....OPPO..OppO.....",
    ".....OPPO..OppO.....",
    ".....OPPO..OppO.....",
    ".....OBBO..ObbO.....",
    ".....OBBO..ObbO.....",
    ".....OOOO..OOOO....."
  ];

  var LEG_SEQ = [LEGS_STAND, LEGS_A, LEGS_PASS_A, LEGS_B, LEGS_PASS_B];
  var BOB_SEQ = [0, 1, 0, 1, 0];
  var ARM_SEQ = [0, 1, 0, -1, 0];

  var SPR_W = 20;
  var HEAD_H = HEAD_F.length, TORSO_H = TORSO_F.length;
  var SPR_H = HEAD_H + TORSO_H + LEGS_STAND.length + 1;

  function palette(hat, coat, pants) {
    var H = rgb(hat), J = rgb(coat), P = rgb(pants), S = rgb(HEX.skin);
    return {
      O: rgb(HEX.O), H: H, G: shade(H, 1.3), N: shade(H, 0.7),
      F: S, S: shade(S, 0.82), E: rgb(HEX.O), M: rgb(HEX.mouth),
      J: J, K: shade(J, 0.62), A: shade(J, 0.74),
      P: P, p: shade(P, 0.68),
      B: rgb(HEX.light), b: shade(rgb(HEX.light), 0.66),
      ".": CLEAR
    };
  }

  /* Rasterise one sprite into its own canvas, once, then reuse it. */
  function buildSprite(pal, back, frame, mirror) {
    var cv = document.createElement("canvas");
    cv.width = SPR_W; cv.height = SPR_H;
    var ctx = cv.getContext("2d");
    var im = ctx.createImageData(SPR_W, SPR_H);
    var head = back ? HEAD_B : HEAD_F;
    var torso = back ? TORSO_B : TORSO_F;
    var legs = LEG_SEQ[frame], bob = BOB_SEQ[frame], arm = ARM_SEQ[frame];

    function put(x, y, ch) {
      if (ch === "." || x < 0 || x >= SPR_W || y < 0 || y >= SPR_H) return;
      var c = pal[ch];
      if (!c || !c[3]) return;
      var i = (y * SPR_W + (mirror ? SPR_W - 1 - x : x)) * 4;
      im.data[i] = c[0]; im.data[i + 1] = c[1];
      im.data[i + 2] = c[2]; im.data[i + 3] = c[3];
    }
    head.forEach(function (row, j) {
      for (var i = 0; i < row.length; i++) put(i, j + bob, row[i]);
    });
    torso.forEach(function (row, j) {
      for (var i = 0; i < row.length; i++) {
        var ch = row[i];
        var dy = (ch === "A" || ch === "S")
          ? (i < SPR_W / 2 ? arm : -arm) : 0;
        put(i, HEAD_H + j + bob + dy, ch);
      }
    });
    legs.forEach(function (row, j) {
      for (var i = 0; i < row.length; i++) put(i, HEAD_H + TORSO_H + j, row[i]);
    });
    ctx.putImageData(im, 0, 0);
    return cv;
  }

  /* SE and SW face the camera; NW and NE face away. Each pair is one grid
     plus its reflection - 4 directions from 2 authored sprites. */
  var DIRS = { SE: [false, false], SW: [false, true],
               NW: [true, false],  NE: [true, true] };

  function makeSpriteSet(hat, coat, pants) {
    var pal = palette(hat, coat, pants), set = {};
    Object.keys(DIRS).forEach(function (d) {
      set[d] = LEG_SEQ.map(function (_, f) {
        return buildSprite(pal, DIRS[d][0], f, DIRS[d][1]);
      });
    });
    return set;
  }

  /* ================= room ================= */
  var TW = 32, TH = 16, GW = 9, GH = 9;
  var OX = 170, OY = 96;
  var WALL_H = 44;

  var cv = document.getElementById("stage");
  var ctx = cv.getContext("2d");
  ctx.imageSmoothingEnabled = false;

  /* Tiles occupied by furniture - the pathfinder routes around these. */
  var BLOCKED = {};
  function block(x, y) { BLOCKED[x + "," + y] = true; }
  var SPEAKER = [8, 0], BENCH = [[1, 7], [2, 7]];
  block(SPEAKER[0], SPEAKER[1]);
  BENCH.forEach(function (b) { block(b[0], b[1]); });

  function walkable(x, y) {
    return x >= 0 && y >= 0 && x < GW && y < GH && !BLOCKED[x + "," + y];
  }
  function centre(tx, ty) {
    return { x: (tx - ty) * (TW / 2) + OX, y: (tx + ty) * (TH / 2) + OY };
  }
  /* Inverse of the projection: rounding in tile space lands in the right
     diamond, which is why this beats hit-testing each tile. */
  function screenToTile(mx, my) {
    var dx = (mx - OX) / (TW / 2), dy = (my - OY) / (TH / 2);
    return { x: Math.round((dx + dy) / 2), y: Math.round((dy - dx) / 2) };
  }

  function diamond(c) {
    ctx.beginPath();
    ctx.moveTo(c.x, c.y - TH / 2);
    ctx.lineTo(c.x + TW / 2, c.y);
    ctx.lineTo(c.x, c.y + TH / 2);
    ctx.lineTo(c.x - TW / 2, c.y);
    ctx.closePath();
  }

  function drawBox(tx, ty, h, top, left, right) {
    var c = centre(tx, ty), x = c.x, y = c.y;
    ctx.fillStyle = left;
    ctx.beginPath();
    ctx.moveTo(x - TW / 2, y - h); ctx.lineTo(x, y + TH / 2 - h);
    ctx.lineTo(x, y + TH / 2); ctx.lineTo(x - TW / 2, y);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = right;
    ctx.beginPath();
    ctx.moveTo(x, y + TH / 2 - h); ctx.lineTo(x + TW / 2, y - h);
    ctx.lineTo(x + TW / 2, y); ctx.lineTo(x, y + TH / 2);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = top;
    ctx.beginPath();
    ctx.moveTo(x, y - TH / 2 - h); ctx.lineTo(x + TW / 2, y - h);
    ctx.lineTo(x, y + TH / 2 - h); ctx.lineTo(x - TW / 2, y - h);
    ctx.closePath(); ctx.fill();
  }

  /* A horizontal band across a run of wall segments. `d` is the drop from the
     wall's top edge, `h` the band height; both follow the wall's slope, which
     is what keeps the checkered trim sitting flat on the surface instead of
     sliding off it. Side "L" is the back-left wall, "R" the back-right. */
  function wallBand(from, to, side, d, h, fill) {
    ctx.fillStyle = fill;
    for (var i = from; i < to; i++) {
      var c = centre(side === "L" ? 0 : i, side === "L" ? i : 0);
      var ax = side === "L" ? c.x - TW / 2 : c.x;
      var ay = (side === "L" ? c.y : c.y - TH / 2) - WALL_H + d;
      var bx = side === "L" ? c.x : c.x + TW / 2;
      var by = (side === "L" ? c.y - TH / 2 : c.y) - WALL_H + d;
      ctx.beginPath();
      ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
      ctx.lineTo(bx, by + h); ctx.lineTo(ax, ay + h);
      ctx.closePath(); ctx.fill();
    }
  }

  /* A point on the back-right wall in face-local coordinates: `u` runs 0..1
     across one tile, `v` drops from the wall top. Lets flat artwork sit on the
     wall in perspective without hand-solving each corner. */
  function wallPoint(tx, u, v) {
    var c = centre(tx, 0);
    return { x: c.x + u * (TW / 2),
             y: (c.y - TH / 2 - WALL_H) + u * (TH / 2) + v };
  }
  function wallQuad(tx, u0, u1, v0, v1, fill) {
    var a = wallPoint(tx, u0, v0), b = wallPoint(tx, u1, v0);
    var d = wallPoint(tx, u1, v1), e = wallPoint(tx, u0, v1);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.lineTo(d.x, d.y); ctx.lineTo(e.x, e.y);
    ctx.closePath(); ctx.fillStyle = fill; ctx.fill();
  }

  /* A framed record sleeve on the wall - the one warm object in the room, so
     the eye has somewhere to land that isn't black, white or cyan. */
  function poster(tx) {
    /* Hangs below the frieze, which occupies v 3..15. */
    wallQuad(tx, 0.08, 0.92, 18, 41, HEX.gold);
    wallQuad(tx, 0.12, 0.88, 20, 39, css(shade(rgb(HEX.gold), 0.55)));
    wallQuad(tx, 0.16, 0.84, 22, 37, HEX.O);
    wallQuad(tx, 0.16, 0.84, 22, 30, css(shade(rgb(HEX.mid), 1.1)));
    wallQuad(tx, 0.16, 0.84, 30, 37, HEX.deep2);
    /* the sleeve's diagonal flash, echoing the sun glint on the snow */
    wallQuad(tx, 0.27, 0.39, 22, 37, HEX.bright);
    wallQuad(tx, 0.43, 0.49, 22, 37, HEX.chkLight);
  }

  /* ================= A* ================= */
  function findPath(sx, sy, gx, gy) {
    if (!walkable(gx, gy)) return null;
    if (sx === gx && sy === gy) return [];
    var key = function (x, y) { return x + "," + y; };
    var open = [{ x: sx, y: sy, g: 0, f: 0, p: null }];
    var seen = {}; seen[key(sx, sy)] = 0;
    var STEPS = [[1, 0], [-1, 0], [0, 1], [0, -1]];
    while (open.length) {
      var bi = 0;
      for (var i = 1; i < open.length; i++) if (open[i].f < open[bi].f) bi = i;
      var cur = open.splice(bi, 1)[0];
      if (cur.x === gx && cur.y === gy) {
        var out = [];
        for (var n = cur; n.p; n = n.p) out.unshift({ x: n.x, y: n.y });
        return out;
      }
      for (var s = 0; s < STEPS.length; s++) {
        var nx = cur.x + STEPS[s][0], ny = cur.y + STEPS[s][1];
        if (!walkable(nx, ny)) continue;
        var ng = cur.g + 1, k = key(nx, ny);
        if (seen[k] !== undefined && seen[k] <= ng) continue;
        seen[k] = ng;
        open.push({ x: nx, y: ny, g: ng,
                    f: ng + Math.abs(nx - gx) + Math.abs(ny - gy), p: cur });
      }
    }
    return null;
  }

  /* ================= entities ================= */
  var SPEED = 2.6;   /* tiles per second */

  /* Kept short on purpose: a bubble wider than a couple of tiles covers the
     room it is supposed to be standing in. */
  var CHATTER = [
    "stay frosty", "this beat is COLD", "who's on the decks?",
    "brb, refill", "nice kicks", "is this the ice list?",
    "sub-zero", "put the demo on", "❄❄❄", "lol",
    "checkerboard hits", "10/10 floor"
  ];

  function Guest(tx, ty, sprites, wander) {
    this.tx = tx; this.ty = ty;
    this.px = tx; this.py = ty;          /* smooth position, in tile units */
    this.sprites = sprites;
    this.path = []; this.dir = "SE";
    this.dist = 0;                        /* drives the walk frame */
    this.wander = !!wander;
    this.idle = Math.random() * 3;
    this.msg = null; this.msgT = 0;
    this.nextMsg = 2 + Math.random() * 8;
  }

  /* Only the wanderers talk. The player speaking unprompted would read as the
     room putting words in your mouth. */
  Guest.prototype.chat = function (dt) {
    if (!this.wander) return;
    if (this.msg) {
      this.msgT -= dt;
      if (this.msgT <= 0) this.msg = null;
      return;
    }
    this.nextMsg -= dt;
    if (this.nextMsg <= 0) {
      this.msg = CHATTER[(Math.random() * CHATTER.length) | 0];
      this.msgT = 3.4;
      this.nextMsg = 7 + Math.random() * 11;
    }
  };

  Guest.prototype.drawBubble = function () {
    if (!this.msg) return;
    var c = { x: (this.px - this.py) * (TW / 2) + OX,
              y: (this.px + this.py) * (TH / 2) + OY };
    ctx.font = '8px ui-monospace,Consolas,monospace';
    ctx.textBaseline = "top";
    var w = Math.ceil(ctx.measureText(this.msg).width) + 8;
    var h = 13;
    var x = Math.round(c.x - w / 2);
    /* Clamp inside the canvas so a guest at the back wall or the far edge
       still gets a readable bubble instead of a clipped one. */
    x = Math.max(2, Math.min(cv.width - w - 2, x));
    var y = Math.max(2, Math.round(c.y - SPR_H - h - 2));

    ctx.fillStyle = HEX.bubbleInk;
    ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
    ctx.fillStyle = HEX.bubble;
    ctx.fillRect(x, y, w, h);
    /* tail, kept on the speaker even when the bubble itself was clamped */
    var tx2 = Math.max(x + 2, Math.min(x + w - 5, Math.round(c.x - 2)));
    ctx.fillStyle = HEX.bubbleInk;
    ctx.fillRect(tx2 - 1, y + h, 5, 4);
    ctx.fillStyle = HEX.bubble;
    ctx.fillRect(tx2, y + h, 3, 3);

    ctx.fillStyle = HEX.bubbleInk;
    ctx.fillText(this.msg, x + 4, y + 3);
  };

  Guest.prototype.goto = function (gx, gy) {
    var p = findPath(this.tx, this.ty, gx, gy);
    if (p && p.length) this.path = p;
  };

  Guest.prototype.update = function (dt) {
    this.chat(dt);
    if (!this.path.length) {
      this.px = this.tx; this.py = this.ty;
      if (this.wander) {
        this.idle -= dt;
        if (this.idle <= 0) {
          this.idle = 2 + Math.random() * 4;
          this.goto((Math.random() * GW) | 0, (Math.random() * GH) | 0);
        }
      }
      return;
    }
    var next = this.path[0];
    var dx = next.x - this.tx, dy = next.y - this.ty;
    /* facing follows the step being taken */
    if (dx > 0) this.dir = "SE";
    else if (dx < 0) this.dir = "NW";
    else if (dy > 0) this.dir = "SW";
    else if (dy < 0) this.dir = "NE";

    var step = SPEED * dt;
    this.dist += step;
    var rx = next.x - this.px, ry = next.y - this.py;
    var rem = Math.abs(rx) + Math.abs(ry);
    if (step >= rem) {
      this.tx = next.x; this.ty = next.y;
      this.px = next.x; this.py = next.y;
      this.path.shift();
    } else {
      this.px += Math.sign(rx) * step * (Math.abs(rx) > 0 ? 1 : 0);
      this.py += Math.sign(ry) * step * (Math.abs(ry) > 0 ? 1 : 0);
    }
  };

  Guest.prototype.frame = function () {
    /* Tie the cycle to distance travelled, not wall time, so the feet never
       skate against the movement. */
    return this.path.length ? 1 + (((this.dist * 3) | 0) % 4) : 0;
  };

  Guest.prototype.depth = function () { return this.px + this.py; };

  Guest.prototype.draw = function () {
    var c = { x: (this.px - this.py) * (TW / 2) + OX,
              y: (this.px + this.py) * (TH / 2) + OY };
    ctx.save();
    ctx.globalAlpha = 0.32;
    ctx.fillStyle = "#02080e";
    ctx.beginPath();
    ctx.ellipse(c.x, c.y + 1, 9, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.drawImage(this.sprites[this.dir][this.frame()],
                  Math.round(c.x - SPR_W / 2),
                  Math.round(c.y - SPR_H + 5));
  };

  var frostSet = makeSpriteSet(HEX.f3, HEX.bright, HEX.f4);
  var guests = [
    new Guest(4, 4, frostSet, false),
    new Guest(2, 1, makeSpriteSet(HEX.gold, "#c84a6e", HEX.deep2), true),
    new Guest(7, 5, makeSpriteSet(HEX.light, "#4a8fb5", HEX.deep2), true)
  ];
  var player = guests[0];

  /* ================= render ================= */
  var hover = null;

  function render() {
    ctx.fillStyle = HEX.O;
    ctx.fillRect(0, 0, cv.width, cv.height);

    /* Walls are quiet on purpose. With a hard black-and-white floor carrying
       the room, patterning these too would leave the eye nowhere to rest. */
    wallBand(0, GH, "L", 0, WALL_H, HEX.deep2);
    wallBand(0, GW, "R", 0, WALL_H, css(shade(rgb(HEX.mid), 0.8)));

    /* Checkered frieze: two stacked rows, offset per column, so it reads as a
       real checkerboard band rather than a dashed stripe.

       It runs along the TOP of the wall, not the bottom. Sat at skirting
       height it butted straight into the checkerboard floor and the two
       patterns dissolved into each other - as a frieze it has dark wall on
       both sides and stays legible. */
    var TRIM = 6, TOP = 3;
    for (var w = 0; w < GH; w++) {
      wallBand(w, w + 1, "L", TOP, TRIM,
               w % 2 ? HEX.chkLight : HEX.chkDark);
      wallBand(w, w + 1, "L", TOP + TRIM, TRIM,
               w % 2 ? HEX.chkDark : HEX.chkLight);
    }
    for (var w2 = 0; w2 < GW; w2++) {
      wallBand(w2, w2 + 1, "R", TOP, TRIM,
               w2 % 2 ? HEX.chkLight : HEX.chkDark);
      wallBand(w2, w2 + 1, "R", TOP + TRIM, TRIM,
               w2 % 2 ? HEX.chkDark : HEX.chkLight);
    }

    poster(3);

    /* Floor: the checkerboard is the room's whole identity, so it runs edge
       to edge with no competing tint. */
    for (var y = 0; y < GH; y++) {
      for (var x = 0; x < GW; x++) {
        var c3 = centre(x, y);
        diamond(c3);
        ctx.fillStyle = ((x + y) % 2 === 0) ? HEX.chkLight : HEX.chkDark;
        ctx.fill();
        /* Hairline seam in the light square's own tone - a bright grid over
           black squares would read as a wireframe, not a floor. */
        ctx.strokeStyle = "rgba(120,160,185,.35)";
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
    /* hover highlight */
    if (hover && walkable(hover.x, hover.y)) {
      diamond(centre(hover.x, hover.y));
      ctx.fillStyle = "rgba(56,230,255,.28)";
      ctx.fill();
      ctx.strokeStyle = HEX.bright; ctx.stroke();
    }

    /* everything that stands up, painted back to front */
    var items = [];
    items.push({ d: SPEAKER[0] + SPEAKER[1], f: function () {
      drawBox(SPEAKER[0], SPEAKER[1], 16, css(shade(rgb(HEX.deep2), 1.3)),
              HEX.deep2, css(shade(rgb(HEX.deep2), 1.12)));
      drawBox(SPEAKER[0], SPEAKER[1], 32, css(shade(rgb(HEX.deep2), 1.15)),
              css(shade(rgb(HEX.deep2), 0.85)), HEX.deep2);
      var c4 = centre(SPEAKER[0], SPEAKER[1]);
      [[10, 5], [26, 3]].forEach(function (s) {
        ctx.save();
        ctx.translate(c4.x + 8, c4.y - s[0]);
        ctx.transform(1, 0.5, 0, 1, 0, 0);
        ctx.beginPath(); ctx.arc(0, 0, s[1], 0, Math.PI * 2);
        ctx.fillStyle = css(shade(rgb(HEX.O), 1.4)); ctx.fill();
        ctx.beginPath(); ctx.arc(0, 0, s[1] * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = HEX.gold; ctx.fill();
        ctx.restore();
      });
    } });
    BENCH.forEach(function (b) {
      items.push({ d: b[0] + b[1], f: function () {
        drawBox(b[0], b[1], 7, HEX.f3, css(shade(rgb(HEX.f4), 0.8)), HEX.f4);
      } });
    });
    guests.forEach(function (g) {
      items.push({ d: g.depth(), f: function () { g.draw(); } });
    });
    items.sort(function (a, b) { return a.d - b.d; });
    items.forEach(function (it) { it.f(); });

    /* Bubbles last and unsorted: speech should never be occluded by furniture
       standing in front of the speaker. */
    guests.forEach(function (g) { g.drawBubble(); });
  }

  /* ================= input ================= */
  function toCanvas(ev) {
    var r = cv.getBoundingClientRect();
    return { x: (ev.clientX - r.left) * (cv.width / r.width),
             y: (ev.clientY - r.top) * (cv.height / r.height) };
  }
  cv.addEventListener("mousemove", function (ev) {
    var p = toCanvas(ev);
    hover = screenToTile(p.x, p.y);
  });
  cv.addEventListener("mouseleave", function () { hover = null; });
  cv.addEventListener("click", function (ev) {
    var p = toCanvas(ev), t = screenToTile(p.x, p.y);
    if (walkable(t.x, t.y)) player.goto(t.x, t.y);
  });

  /* ================= loop ================= */
  var last = performance.now();
  var hud = document.getElementById("hud");
  function tick(now) {
    var dt = Math.min((now - last) / 1000, 0.05);
    last = now;
    guests.forEach(function (g) { g.update(dt); });
    render();
    hud.textContent = "tile " + player.tx + "," + player.ty +
                      "  facing " + player.dir +
                      "  frame " + player.frame() +
                      "  queue " + player.path.length;
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  /* Exposed purely so the room can be driven from the console while testing.
     render and step are here because requestAnimationFrame is suspended
     outright in a hidden tab - without a synchronous way to paint, a headless
     capture just grabs an unpainted canvas. */
  window.LOUNGE = {
    guests: guests, player: player, findPath: findPath,
    screenToTile: screenToTile, centre: centre, walkable: walkable,
    render: render,
    step: function (dt, n) {
      for (var i = 0; i < (n || 1); i++) {
        guests.forEach(function (g) { g.update(dt); });
      }
      render();
    },
    dims: { TW: TW, TH: TH, GW: GW, GH: GH, SPR_W: SPR_W, SPR_H: SPR_H }
  };
})();
</script>
